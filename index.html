<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect | Premium Medical Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="appointment-card">
        <div class="header">
            <div class="logo">➕</div>
            <h1>CareFlow</h1>
            <p>Quality care is just a click away.</p>
        </div>

        <form id="appointmentForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="userPhone" placeholder="+1 (555) 000-0000" required>
            </div>

            <div class="input-group">
                <label>Department</label>
                <select id="dept" required>
                    <option value="" disabled selected>Choose a department</option>
                    <option value="General">General Consultation</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Dental">Dental Care</option>
                    <option value="Neurology">Neurology</option>
                </select>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="appDate" required>
                </div>
                <div class="input-group">
                    <label>Time</label>
                    <input type="time" id="appTime" required>
                </div>
            </div>

            <button type="submit" id="submitBtn">Request Appointment</button>
        </form>

        <div id="successMessage" class="hidden">
            <div class="success-icon">Ready!</div>
            <h3>Request Received</h3>
            <p>An agent will call you shortly to confirm your slot at <strong>CareFlow</strong>.</p>
            <button onclick="location.reload()" class="btn-secondary">Book Another</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
