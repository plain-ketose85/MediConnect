<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect | Premium Medical Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="appointment-card">
        <div class="header">
            <div class="logo">➕</div>
            <h1><p>MediConnect</h1>
            <p>Quality care is just a click away.</p>
        </div>

        <form id="appointmentForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="Name" id="userName" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" name="Phone" id="userPhone" placeholder="+1 (555) 000-0000" required>
            </div>

            <div class="input-group">
                <label>Department</label>
                <select name="Department" id="dept" required>
                    <option value="" disabled selected>Choose a department</option>
                    <option value="General">General Consultation</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Dental">Dental Care</option>
                    <option value="Neurology">Neurology</option>
                </select>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" name="Date" id="appDate" required>
                </div>
                <div class="input-group">
                    <label>Time</label>
                    <input type="time" name="Time" id="appTime" required>
                </div>
            </div>

            <button type="submit" id="submitBtn">Request Appointment</button>
        </form>

        <div id="successMessage" class="hidden">
    <div class="success-icon">❤️</div>
    <h3>Thank You for Booking!</h3>
    
    <div class="appointment-id-box" id="printableArea">
        <p>Your Appointment ID</p>
        <h2 id="displayID">#CF-0000</h2>
        <p id="receiptName" style="font-size: 1rem; color: #1e293b; margin-top: 10px;"></p>
        <p id="receiptDateTime" style="font-size: 0.8rem; color: #64748b;"></p>
    </div>

    <button onclick="window.print()" class="btn-print">🖨️ Print Receipt</button>
    
    <button onclick="location.reload()" class="btn-secondary">Book Another Appointment</button>
</div>
    <script src="script.js"></script>
</body>
</html>
